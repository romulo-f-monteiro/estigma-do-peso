<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STOP ESTIGMA DO PESO - Relatos Anônimos</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    .animate-slide-up { animation: slideUp 0.6s ease-out forwards; }
    
    /* Custom scrollbar for datalist/select replacements if needed */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
  </style>
</head>
<body class="bg-[#FDFBF7] font-sans text-stone-800 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // =========================
    // CONFIGURAÇÃO SUPABASE (INTACTA)
    // =========================
    const supabaseUrl = 'https://mybchkuhrgwzlyusfccn.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15YmNoa3Vocmd3emx5dXNmY2NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODY3NjEsImV4cCI6MjA5MDY2Mjc2MX0.-sZQzrcD7fi2x84RqdBGsr6-b-hkMaamVsvOJBBam60';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // =========================
    // ÍCONES
    // =========================
    const Icon = ({ path, className = "w-6 h-6", fill = "none" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {path}
      </svg>
    );

    const Hand = (p) => <Icon {...p} path={<><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 7.5V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M10 10.5V5a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M6 14v-1.5a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M18 11v4a6 6 0 0 1-6 6h-2.5a6 6 0 0 1-6-6v-1.5"/></>} />;
    const Shield = (p) => <Icon {...p} path={<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>} />;
    const SearchIcon = (p) => <Icon {...p} path={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>} />;
    const MessageSquare = (p) => <Icon {...p} path={<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>} />;
    const ArrowRight = (p) => <Icon {...p} path={<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>} />;
    const CheckCircle2 = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>} />;
    const Lightbulb = (p) => <Icon {...p} path={<><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>} />;
    const FilterIcon = (p) => <Icon {...p} path={<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>} />;
    const ThumbsUp = (p) => <Icon {...p} path={<path d="M7 10v12M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z"/>} />;

    // =========================
    // LISTA DE LOCAIS EXPANDIDA
    // =========================
    const ALL_LOCATIONS = [
      "Restaurante", "Academia", "Clínica/Hospital", "Consultório Médico", 
      "Consultório Psicológico", "Nutricionista", "Clínicas Estéticas", 
      "Loja", "Shopping", "Transporte Público", "Avião/Aeroporto", 
      "Uber/Motorista", "Trabalho", "Entrevista de Emprego", "Escola/Faculdade", 
      "Família", "Grupo de Amigos", "Festas/Eventos Sociais", "Relacionamentos/Encontros", 
      "Redes Sociais", "Internet/Comentários Online", "Jogos Online", 
      "Eventos/Auditórios/Igrejas", "Espaços Públicos (parques, praia)", 
      "Aulas (yoga, dança, esportes)", "Delivery/Atendimento Online", "Outro"
    ].sort();

    // =========================
    // DADOS DE APOIO
    // =========================
    const fallbackReports = [
      { id: 1, location: 'Clínica/Hospital', description: 'Fui ao médico e senti que a minha queixa foi ignorada por causa do meu corpo.', feelings: 'Me senti humilhada e invalidada.', suggestion: 'Ouvir a queixa principal do paciente sem presumir tudo pelo peso.' },
      { id: 2, location: 'Academia', description: 'Ao entrar na academia, recebi comentários não solicitados sobre emagrecimento.', feelings: 'Fiquei desconfortável e deslocada.', suggestion: 'Treinar a equipe para acolher sem comentar o corpo dos alunos.' }
    ];

    const learningData = [
      { category: 'Ambientes de Saúde', tips: ['Adquira equipamentos adequados (macas, balanças, cadeiras) para todos os corpos.', 'Foque na queixa principal do paciente, não resuma o diagnóstico ao peso.', 'Treine a equipe para um acolhimento empático e sem julgamentos.'] },
      { category: 'Academias e Esportes', tips: ['Garanta infraestrutura acessível (catracas, aparelhos).', 'Evite presumir que o único objetivo do aluno é emagrecer.', 'Promova um ambiente focado em saúde e bem-estar, não apenas estética.'] },
      { category: 'Lojas e Comércio', tips: ['Ofereça uma grade de tamanhos realmente inclusiva.', 'Treine vendedores para não fazerem comentários sobre o corpo do cliente ou sugerirem dietas.'] }
    ];

    // =========================
    // APP PRINCIPAL
    // =========================
    function App() {
      const [currentView, setCurrentView] = useState('home');
      const [reports, setReports] = useState([]);
      const [isLoading, setIsLoading] = useState(true);

      useEffect(() => {
        fetchReports();
      }, []);

      const fetchReports = async () => {
        try {
          setIsLoading(true);
          const { data, error } = await supabase
            .from('reports')
            .select('id, location, description, feelings, suggestion')
            .order('id', { ascending: false });

          if (error) throw error;
          setReports(data || []);
        } catch (error) {
          console.error('Erro ao buscar relatos:', error);
          setReports(fallbackReports);
        } finally {
          setIsLoading(false);
        }
      };

      const navigateTo = (view) => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setCurrentView(view);
      };

      const handleAddReport = async (newReport) => {
        const payload = {
          location: newReport.location === 'Outro' 
            ? (newReport.customLocation.trim() || 'Outro') 
            : newReport.location,
          description: newReport.description.trim(),
          feelings: newReport.feelings.trim(),
          suggestion: newReport.suggestion.trim()
        };

        const { error } = await supabase.from('reports').insert([payload]);

        if (error) {
          console.error('Erro ao salvar relato:', error);
          throw error;
        }
        await fetchReports();
      };

      return (
        <div className="min-h-screen flex flex-col">
          <nav className="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-rose-100 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-20">
                <div className="flex items-center cursor-pointer group" onClick={() => navigateTo('home')}>
                  <div className="bg-rose-600 p-2.5 rounded-xl group-hover:bg-rose-700 transition-colors shadow-sm">
                    <Hand className="h-7 w-7 text-white" />
                  </div>
                  <span className="ml-3 font-black text-2xl tracking-tighter text-stone-900">
                    STOP <span className="text-rose-600">ESTIGMA DO PESO</span>
                  </span>
                </div>

                <div className="hidden md:flex space-x-8 items-center">
                  <button onClick={() => navigateTo('home')} className={`font-semibold transition-colors ${currentView === 'home' ? 'text-rose-600' : 'text-stone-500 hover:text-rose-600'}`}>Início</button>
                  <button onClick={() => navigateTo('feed')} className={`font-semibold transition-colors ${currentView === 'feed' ? 'text-rose-600' : 'text-stone-500 hover:text-rose-600'}`}>Ver Relatos</button>
                  <button onClick={() => navigateTo('learn')} className={`font-semibold transition-colors ${currentView === 'learn' ? 'text-rose-600' : 'text-stone-500 hover:text-rose-600'}`}>Aprender</button>
                  <button onClick={() => navigateTo('report')} className="bg-rose-600 text-white font-bold px-6 py-2.5 rounded-full hover:bg-rose-700 transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    Relatar Experiência
                  </button>
                </div>

                <div className="md:hidden flex items-center gap-3">
                  <button onClick={() => navigateTo('feed')} className="text-stone-500 p-2"><SearchIcon className="w-6 h-6"/></button>
                  <button onClick={() => navigateTo('report')} className="bg-rose-600 text-white px-4 py-2.5 rounded-full font-bold text-sm shadow-md">
                    Relatar
                  </button>
                </div>
              </div>
            </div>
          </nav>

          <main className="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
            {currentView === 'home' && <HomeView onNavigate={navigateTo} />}
            {currentView === 'report' && <ReportForm onSubmit={handleAddReport} onNavigate={navigateTo} />}
            {currentView === 'feed' && <FeedView reports={reports} isLoading={isLoading} />}
            {currentView === 'learn' && <LearnView />}
          </main>

          <footer className="bg-stone-900 text-white py-12 mt-auto">
            <div className="max-w-6xl mx-auto px-4 text-center">
              <div className="flex justify-center items-center mb-6">
                <Hand className="h-8 w-8 text-rose-500 mr-3" />
                <span className="font-black text-2xl tracking-tighter">STOP ESTIGMA DO PESO</span>
              </div>
              <p className="text-stone-400 text-base max-w-2xl mx-auto mb-6">
                Um espaço seguro e anônimo para dar voz às experiências de discriminação e educar a sociedade para ambientes mais inclusivos.
              </p>
              <div className="pt-6 border-t border-stone-800 text-stone-500 text-sm font-medium">
                Criado por pesquisadores que entendem essa dor e buscam transformação real.
              </div>
            </div>
          </footer>
        </div>
      );
    }

    // =========================
    // HOME VIEW (DESTACADA)
    // =========================
    function HomeView({ onNavigate }) {
      return (
        <div className="animate-slide-up">
          <div className="text-center max-w-5xl mx-auto mb-16 pt-4 md:pt-10">
            <div className="inline-flex items-center space-x-2 bg-green-100 text-green-800 px-5 py-2 rounded-full text-sm font-bold mb-8 shadow-sm">
              <Shield className="h-5 w-5" />
              <span>Ambiente 100% Anônimo, Seguro e Sem Julgamentos</span>
            </div>

            <h1 className="text-5xl md:text-7xl font-black text-stone-900 leading-tight mb-8 tracking-tight">
              Sua voz tem o poder de <br className="hidden md:block"/>
              <span className="text-rose-600">transformar espaços.</span>
            </h1>

            <p className="text-xl md:text-2xl text-stone-600 mb-12 leading-relaxed max-w-3xl mx-auto">
              O estigma do peso afeta o acesso à saúde, lazer, trabalho e convivência. Compartilhe sua história anonimamente ou leia relatos para entender como podemos melhorar a sociedade.
            </p>

            <div className="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">
              {/* Botão Card 1 */}
              <button 
                onClick={() => onNavigate('report')} 
                className="group relative bg-rose-600 text-left p-8 md:p-10 rounded-3xl shadow-xl hover:shadow-2xl hover:bg-rose-700 transition-all transform hover:-translate-y-2 overflow-hidden"
              >
                <div className="absolute top-0 right-0 -mt-4 -mr-4 bg-white/10 w-32 h-32 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-700"></div>
                <MessageSquare className="h-12 w-12 text-white mb-6" />
                <h2 className="text-3xl font-black text-white mb-3 flex items-center">
                  Relatar Experiência
                  <ArrowRight className="ml-3 opacity-0 group-hover:opacity-100 transition-opacity" />
                </h2>
                <p className="text-rose-100 text-lg font-medium">
                  Relate aqui suas experiências vividas. É rápido, fácil e totalmente anônimo. Ajude a expor barreiras e sugerir melhorias.
                </p>
              </button>

              {/* Botão Card 2 */}
              <button 
                onClick={() => onNavigate('feed')} 
                className="group bg-white border-2 border-stone-200 text-left p-8 md:p-10 rounded-3xl shadow-md hover:shadow-xl hover:border-rose-300 transition-all transform hover:-translate-y-2"
              >
                <SearchIcon className="h-12 w-12 text-rose-500 mb-6" />
                <h2 className="text-3xl font-black text-stone-900 mb-3 flex items-center">
                  Ver Relatos
                  <ArrowRight className="ml-3 text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity" />
                </h2>
                <p className="text-stone-600 text-lg font-medium">
                  Leia o mural de experiências, pesquise por locais ou palavras-chave e veja o impacto real do estigma no dia a dia.
                </p>
              </button>
            </div>
          </div>
        </div>
      );
    }

    // =========================
    // FORMULÁRIO DE RELATO
    // =========================
    function ReportForm({ onSubmit, onNavigate }) {
      const [formData, setFormData] = useState({ location: '', customLocation: '', description: '', feelings: '', suggestion: '' });
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isSuccess, setIsSuccess] = useState(false);
      const [errorMessage, setErrorMessage] = useState('');

      const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

      const handleSubmit = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        setErrorMessage('');
        try {
          await onSubmit(formData);
          setIsSuccess(true);
          setTimeout(() => onNavigate('feed'), 2000);
        } catch (error) {
          setErrorMessage('Não foi possível enviar. Tente novamente.');
        } finally {
          setIsSubmitting(false);
        }
      };

      if (isSuccess) {
        return (
          <div className="max-w-2xl mx-auto bg-white p-12 rounded-3xl shadow-lg border border-stone-100 text-center animate-fade-in mt-10">
            <div className="bg-green-100 p-5 rounded-full inline-block mb-6"><CheckCircle2 className="h-16 w-16 text-green-600" /></div>
            <h2 className="text-4xl font-black text-stone-900 mb-4">Relato Publicado!</h2>
            <p className="text-xl text-stone-600 mb-8">Obrigado por compartilhar. Sua voz importa muito.</p>
            <p className="text-stone-400 font-medium animate-pulse">Redirecionando para o mural de relatos...</p>
          </div>
        );
      }

      return (
        <div className="max-w-4xl mx-auto animate-slide-up">
          <div className="mb-10">
            <h1 className="text-4xl font-black text-stone-900 mb-4">Relatar Experiência</h1>
            <p className="text-xl text-stone-600">Este é o seu espaço seguro. Descreva o que aconteceu em detalhes para nos ajudar a entender e educar.</p>
          </div>

          <div className="bg-white rounded-[2rem] shadow-xl border border-stone-100 overflow-hidden">
            <div className="bg-rose-50 px-8 py-5 flex items-center text-rose-800 border-b border-rose-100">
              <Shield className="h-6 w-6 text-rose-600 mr-3" />
              <span className="font-bold text-lg">Modo de Segurança Ativo: Nenhuma informação pessoal sua será salva ou exibida.</span>
            </div>

            <form onSubmit={handleSubmit} className="p-8 md:p-12 space-y-8">
              
              {/* Campo Local com Datalist para busca por digitação */}
              <div>
                <label className="block text-lg font-bold text-stone-900 mb-3">Onde isso aconteceu? *</label>
                <div className="relative">
                  <input
                    list="locations-list"
                    name="location"
                    required
                    value={formData.location}
                    onChange={handleChange}
                    placeholder="Digite para buscar ou selecione um local..."
                    className="w-full bg-stone-50 border-2 border-stone-200 rounded-2xl px-5 py-4 text-lg text-stone-800 focus:ring-4 focus:ring-rose-100 focus:border-rose-500 outline-none transition-all"
                  />
                  <datalist id="locations-list">
                    {ALL_LOCATIONS.map(loc => <option key={loc} value={loc} />)}
                  </datalist>
                </div>
                <p className="text-sm text-stone-500 mt-2 font-medium">Se não encontrar na lista, basta digitar o nome do local (ex: "Parque de Diversões").</p>
              </div>

              <div>
                <label className="block text-lg font-bold text-stone-900 mb-3">Descreva o que aconteceu *</label>
                <textarea
                  name="description"
                  required
                  rows="5"
                  value={formData.description}
                  onChange={handleChange}
                  placeholder="Ex: Fui a uma loja e a vendedora disse logo na entrada que 'não tinha nada para o meu tamanho' antes mesmo de eu perguntar. A loja não tinha assentos resistentes no provador..."
                  className="w-full bg-stone-50 border-2 border-stone-200 rounded-2xl px-5 py-4 text-lg outline-none focus:ring-4 focus:ring-rose-100 focus:border-rose-500 resize-none transition-all"
                ></textarea>
              </div>

              <div>
                <label className="block text-lg font-bold text-stone-900 mb-3">Como você se sentiu?</label>
                <textarea
                  name="feelings"
                  rows="3"
                  value={formData.feelings}
                  onChange={handleChange}
                  placeholder="Ex: Me senti invisível, humilhada(o), com vontade de chorar, com raiva, desconfortável..."
                  className="w-full bg-stone-50 border-2 border-stone-200 rounded-2xl px-5 py-4 text-lg outline-none focus:ring-4 focus:ring-rose-100 focus:border-rose-500 resize-none transition-all"
                ></textarea>
              </div>

              <div className="bg-rose-50/50 rounded-2xl p-8 border-2 border-rose-100">
                <label className="block text-lg font-bold text-rose-900 mb-2 flex items-center">
                  <Lightbulb className="h-6 w-6 mr-2 text-rose-600" />
                  O que poderia ter sido feito melhor? *
                </label>
                <p className="text-stone-600 mb-4 font-medium">Na sua visão, o que esse ambiente ou essas pessoas deveriam mudar para serem inclusivos?</p>
                <textarea
                  name="suggestion"
                  required
                  rows="3"
                  value={formData.suggestion}
                  onChange={handleChange}
                  placeholder="Ex: A loja deveria ter uma grade de numeração maior e treinar os funcionários para atenderem todos os clientes com o mesmo respeito, sem presumir manequins..."
                  className="w-full bg-white border-2 border-rose-200 rounded-2xl px-5 py-4 text-lg outline-none focus:ring-4 focus:ring-rose-100 focus:border-rose-400 resize-none transition-all"
                ></textarea>
              </div>

              {errorMessage && (
                <div className="rounded-2xl border-2 border-red-200 bg-red-50 px-5 py-4 text-red-700 font-bold">
                  {errorMessage}
                </div>
              )}

              <div className="pt-6 flex flex-col-reverse sm:flex-row justify-end gap-4 border-t border-stone-100">
                <button type="button" onClick={() => onNavigate('home')} className="px-8 py-4 font-bold text-stone-500 hover:bg-stone-100 rounded-2xl transition-colors">
                  Cancelar
                </button>
                <button type="submit" disabled={isSubmitting} className={`px-10 py-4 bg-rose-600 hover:bg-rose-700 text-white text-lg font-black rounded-2xl shadow-lg hover:shadow-xl transition-all flex items-center justify-center ${isSubmitting ? 'opacity-70 cursor-wait' : 'transform hover:-translate-y-1'}`}>
                  {isSubmitting ? 'Publicando de forma anônima...' : 'Publicar Meu Relato'}
                  {!isSubmitting && <ArrowRight className="ml-2 h-6 w-6" />}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // =========================
    // FEED (MURAL DE RELATOS)
    // =========================
    function FeedView({ reports, isLoading }) {
      const [searchTerm, setSearchTerm] = useState('');
      const [locationFilter, setLocationFilter] = useState('');

      // Sistema de "Curtidas" local para não alterar o banco de dados
      const [likedReports, setLikedReports] = useState(() => {
        try { return JSON.parse(localStorage.getItem('liked_reports')) || {}; } 
        catch { return {}; }
      });

      const handleLike = (id) => {
        const newLikes = { ...likedReports, [id]: !likedReports[id] };
        setLikedReports(newLikes);
        localStorage.setItem('liked_reports', JSON.stringify(newLikes));
      };

      // Lógica de Filtro Duplo (Lupa GERAL + Filtro de Local)
      const filteredReports = reports.filter((r) => {
        const matchKeyword = searchTerm === '' || 
          (r.description && r.description.toLowerCase().includes(searchTerm.toLowerCase())) ||
          (r.location && r.location.toLowerCase().includes(searchTerm.toLowerCase())) ||
          (r.feelings && r.feelings.toLowerCase().includes(searchTerm.toLowerCase()));
        
        const matchLocation = locationFilter === '' || r.location === locationFilter;
        
        return matchKeyword && matchLocation;
      });

      return (
        <div className="animate-slide-up max-w-5xl mx-auto">
          <div className="mb-12 text-center">
            <h1 className="text-4xl md:text-5xl font-black text-stone-900 mb-4">Mural de Relatos</h1>
            <p className="text-xl text-stone-600">Experiências reais transformadas em educação. Leia, pesquise e apoie.</p>
          </div>

          {/* Barra de Pesquisa Principal (A Lupa solicitada) */}
          <div className="bg-white p-4 rounded-2xl md:rounded-full shadow-md border border-stone-200 mb-8 flex flex-col md:flex-row gap-4 items-center relative z-10">
            <div className="relative flex-grow w-full">
              <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <SearchIcon className="h-6 w-6 text-stone-400" />
              </div>
              <input
                type="text"
                placeholder="Pesquise qualquer palavra-chave (ex: cadeira, médico, humilhação, avião)..."
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
                className="w-full pl-12 pr-4 py-3 bg-stone-50 border-none rounded-full text-lg focus:ring-0 outline-none text-stone-800 placeholder-stone-400"
              />
            </div>
            
            <div className="w-full md:w-auto h-12 border-l border-stone-200 hidden md:block mx-2"></div>
            
            {/* Seletor de Local para Busca Rápida de Categorias */}
            <div className="w-full md:w-1/3 flex items-center">
              <FilterIcon className="h-5 w-5 text-stone-400 ml-2 mr-2" />
              <select 
                value={locationFilter} 
                onChange={(e) => setLocationFilter(e.target.value)}
                className="w-full bg-transparent border-none text-stone-700 font-semibold focus:ring-0 outline-none cursor-pointer text-base appearance-none"
              >
                <option value="">Todos os Locais</option>
                {ALL_LOCATIONS.map(loc => <option key={loc} value={loc}>{loc}</option>)}
              </select>
            </div>
          </div>

          {/* Lista de Relatos */}
          <div className="space-y-6">
            {isLoading ? (
              <div className="text-center py-20">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-rose-600 mx-auto mb-4"></div>
                <p className="text-stone-500 font-medium">Buscando relatos no banco de dados...</p>
              </div>
            ) : filteredReports.length === 0 ? (
              <div className="bg-white p-16 text-center rounded-3xl border border-stone-200 shadow-sm">
                <SearchIcon className="h-16 w-16 text-stone-300 mx-auto mb-6" />
                <h3 className="text-2xl font-bold text-stone-800 mb-2">Nenhum relato encontrado.</h3>
                <p className="text-stone-500 text-lg">Tente buscar por outras palavras ou locais.</p>
                <button onClick={() => {setSearchTerm(''); setLocationFilter('');}} className="mt-6 text-rose-600 font-bold hover:underline">Limpar Filtros</button>
              </div>
            ) : (
              filteredReports.map((report) => (
                <div key={report.id} className="bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden hover:shadow-lg transition-shadow">
                  <div className="p-6 md:p-10">
                    <div className="flex justify-between items-start mb-6">
                      <span className="inline-block px-4 py-1.5 bg-rose-100 text-rose-800 text-sm font-black rounded-full uppercase tracking-wider">
                        {report.location}
                      </span>
                    </div>

                    <div className="mb-8">
                      {/* LEGENDA ADICIONADA AQUI */}
                      <p className="text-stone-500 font-bold text-sm uppercase tracking-widest mb-2 text-rose-500">Experiência vivida na pele:</p>
                      <p className="text-stone-900 text-xl leading-relaxed font-medium">"{report.description}"</p>
                    </div>

                    {report.feelings && (
                      <div className="mb-8 pl-4 border-l-4 border-stone-200">
                        <h4 className="text-sm font-bold text-stone-400 uppercase tracking-wider mb-1">Como se sentiu</h4>
                        <p className="text-stone-600 italic text-lg">{report.feelings}</p>
                      </div>
                    )}

                    <div className="bg-[#F0FDF4] border border-[#BBF7D0] rounded-2xl p-6 mt-6">
                      <h4 className="text-sm font-black text-green-800 uppercase tracking-wider mb-3 flex items-center">
                        <Lightbulb className="h-6 w-6 mr-2 text-green-600" />
                        Sugestão de Melhoria para o local
                      </h4>
                      <p className="text-green-900 font-medium text-lg leading-relaxed">{report.suggestion}</p>
                    </div>

                    {/* BOTÃO DE INTERAÇÃO (LIKE/ME TOO) */}
                    <div className="mt-8 pt-6 border-t border-stone-100 flex items-center">
                      <button 
                        onClick={() => handleLike(report.id)}
                        className={`flex items-center gap-2 text-sm font-bold px-4 py-2 rounded-full transition-colors ${
                          likedReports[report.id] 
                          ? 'bg-rose-100 text-rose-700' 
                          : 'bg-stone-50 text-stone-500 hover:bg-stone-100 hover:text-stone-800'
                        }`}
                      >
                        <ThumbsUp className={`h-5 w-5 ${likedReports[report.id] ? 'fill-current' : ''}`} />
                        {likedReports[report.id] ? 'Você também passou por isso' : 'Já passei também por essa experiência'}
                      </button>
                    </div>
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // =========================
    // APRENDER (Mantido e ajustado layout)
    // =========================
    function LearnView() {
      return (
        <div className="animate-slide-up max-w-4xl mx-auto">
          <div className="text-center mb-16">
            <div className="inline-flex items-center space-x-2 bg-stone-100 text-stone-800 px-5 py-2 rounded-full text-sm font-bold mb-6">
              <Lightbulb className="h-5 w-5" />
              <span>Educação Coletiva</span>
            </div>
            <h1 className="text-4xl md:text-5xl font-black text-stone-900 mb-6">Como Construir Ambientes Inclusivos</h1>
            <p className="text-xl text-stone-600 max-w-2xl mx-auto">Guia prático construído a partir das sugestões e dores reais deixadas na plataforma.</p>
          </div>

          <div className="grid gap-8">
            {learningData.map((section, idx) => (
              <div key={idx} className="bg-white rounded-3xl shadow-sm border border-stone-200 p-8 md:p-10">
                <h2 className="text-2xl font-black text-rose-700 mb-6 flex items-center border-b border-stone-100 pb-4">
                  {section.category}
                </h2>
                <ul className="space-y-4">
                  {section.tips.map((tip, i) => (
                    <li key={i} className="flex items-start bg-stone-50 p-4 rounded-2xl">
                      <CheckCircle2 className="h-7 w-7 text-green-500 mr-4 flex-shrink-0" />
                      <span className="text-stone-800 text-lg font-medium">{tip}</span>
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
