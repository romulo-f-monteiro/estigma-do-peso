<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stop Estigma - Relatos Anônimos</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    .animate-slide-up { animation: slideUp 0.6s ease-out forwards; }
  </style>
</head>
<body class="bg-[#FDFBF7] font-sans text-stone-800 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // =========================
    // CONFIGURAÇÃO SUPABASE
    // =========================
    const supabaseUrl = 'https://mybchkuhrgwzlyusfccn.supabase.co';
    const supabaseKey = 'SUA_ANON_KEY_AQUI';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // =========================
    // ÍCONES
    // =========================
    const Icon = ({ path, className = "w-6 h-6", fill = "none" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {path}
      </svg>
    );

    const Hand = (p) => <Icon {...p} path={<><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 7.5V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M10 10.5V5a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M6 14v-1.5a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M18 11v4a6 6 0 0 1-6 6h-2.5a6 6 0 0 1-6-6v-1.5"/></>} />;
    const Shield = (p) => <Icon {...p} path={<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>} />;
    const Search = (p) => <Icon {...p} path={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>} />;
    const MessageSquare = (p) => <Icon {...p} path={<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>} />;
    const ArrowRight = (p) => <Icon {...p} path={<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>} />;
    const CheckCircle2 = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>} />;
    const Lightbulb = (p) => <Icon {...p} path={<><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>} />;
    const Filter = (p) => <Icon {...p} path={<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>} />;

    // =========================
    // DADOS DE APOIO
    // =========================
    const fallbackReports = [
      {
        id: 1,
        location: 'Clínica/Hospital',
        description: 'Fui ao médico e senti que a minha queixa foi ignorada por causa do meu corpo.',
        feelings: 'Me senti humilhada e invalidada.',
        suggestion: 'Ouvir a queixa principal do paciente sem presumir tudo pelo peso.'
      },
      {
        id: 2,
        location: 'Academia',
        description: 'Ao entrar na academia, recebi comentários não solicitados sobre emagrecimento.',
        feelings: 'Fiquei desconfortável e deslocada.',
        suggestion: 'Treinar a equipe para acolher sem comentar o corpo dos alunos.'
      }
    ];

    const learningData = [
      {
        category: 'Clínicas e Hospitais',
        tips: [
          'Adquira equipamentos adequados para diferentes corpos.',
          'Foque na queixa principal do paciente.',
          'Treine a equipe para um acolhimento sem julgamentos.'
        ]
      },
      {
        category: 'Academias',
        tips: [
          'Garanta infraestrutura acessível para corpos maiores.',
          'Evite presumir que o objetivo do aluno é emagrecer.'
        ]
      }
    ];

    // =========================
    // APP
    // =========================
    function App() {
      const [currentView, setCurrentView] = useState('home');
      const [reports, setReports] = useState([]);
      const [isLoading, setIsLoading] = useState(true);

      useEffect(() => {
        fetchReports();
      }, []);

      const fetchReports = async () => {
        try {
          setIsLoading(true);

          const { data, error } = await supabase
            .from('reports')
            .select('id, location, description, feelings, suggestion')
            .order('id', { ascending: false });

          if (error) throw error;

          setReports(data || []);
        } catch (error) {
          console.error('Erro ao buscar relatos:', error);
          setReports(fallbackReports);
        } finally {
          setIsLoading(false);
        }
      };

      const navigateTo = (view) => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setCurrentView(view);
      };

      const handleAddReport = async (newReport) => {
        const payload = {
          location: newReport.location === 'Outro'
            ? (newReport.customLocation.trim() || 'Outro')
            : newReport.location,
          description: newReport.description.trim(),
          feelings: newReport.feelings.trim(),
          suggestion: newReport.suggestion.trim()
        };

        const { error } = await supabase
          .from('reports')
          .insert([payload]);

        if (error) {
          console.error('Erro ao salvar relato:', error);
          throw error;
        }

        await fetchReports();
      };

      return (
        <div className="min-h-screen flex flex-col">
          <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-rose-100 shadow-sm">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-16">
                <div
                  className="flex items-center cursor-pointer group"
                  onClick={() => navigateTo('home')}
                >
                  <div className="bg-rose-600 p-2 rounded-lg group-hover:bg-rose-700 transition-colors">
                    <Hand className="h-6 w-6 text-white" />
                  </div>
                  <span className="ml-3 font-bold text-xl tracking-tight text-stone-900">
                    STOP <span className="text-rose-600">ESTIGMA</span>
                  </span>
                </div>

                <div className="hidden md:flex space-x-8 items-center">
                  <button onClick={() => navigateTo('home')} className={`font-medium transition-colors ${currentView === 'home' ? 'text-rose-600' : 'text-stone-500 hover:text-rose-600'}`}>Início</button>
                  <button onClick={() => navigateTo('feed')} className={`font-medium transition-colors ${currentView === 'feed' ? 'text-rose-600' : 'text-stone-500 hover:text-rose-600'}`}>Ver Relatos</button>
                  <button onClick={() => navigateTo('learn')} className={`font-medium transition-colors ${currentView === 'learn' ? 'text-rose-600' : 'text-stone-500 hover:text-rose-600'}`}>Aprender</button>
                  <button
                    onClick={() => navigateTo('report')}
                    className="bg-rose-600 text-white font-semibold px-5 py-2 rounded-full hover:bg-rose-700 transition-colors shadow-sm"
                  >
                    Relatar Experiência
                  </button>
                </div>

                <div className="md:hidden flex items-center">
                  <button onClick={() => navigateTo('report')} className="bg-rose-100 text-rose-700 px-4 py-2 rounded-full font-medium text-sm">
                    Relatar
                  </button>
                </div>
              </div>
            </div>
          </nav>

          <main className="flex-grow max-w-6xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
            {currentView === 'home' && <HomeView onNavigate={navigateTo} />}
            {currentView === 'report' && <ReportForm onSubmit={handleAddReport} onNavigate={navigateTo} />}
            {currentView === 'feed' && <FeedView reports={reports} isLoading={isLoading} />}
            {currentView === 'learn' && <LearnView />}
          </main>

          <footer className="bg-white border-t border-rose-100 py-10 mt-auto">
            <div className="max-w-6xl mx-auto px-4 text-center">
              <div className="flex justify-center items-center mb-4">
                <Hand className="h-6 w-6 text-rose-300 mr-2" />
                <span className="font-bold text-lg text-stone-400">STOP ESTIGMA</span>
              </div>
              <p className="text-stone-500 text-sm max-w-2xl mx-auto">
                Um espaço seguro e anônimo para combater a discriminação por peso através de relatos e educação coletiva.
              </p>
            </div>
          </footer>
        </div>
      );
    }

    // =========================
    // HOME
    // =========================
    function HomeView({ onNavigate }) {
      return (
        <div className="animate-slide-up">
          <div className="text-center max-w-4xl mx-auto mb-16 pt-8">
            <div className="inline-flex items-center space-x-2 bg-rose-50 text-rose-700 px-4 py-1.5 rounded-full text-sm font-semibold mb-6">
              <Shield className="h-4 w-4" />
              <span>Ambiente 100% Anônimo e Seguro</span>
            </div>

            <h1 className="text-4xl md:text-6xl font-extrabold text-stone-900 leading-tight mb-6">
              Bem-vindo(a) ao <br className="hidden md:block"/>
              <span className="text-rose-600">STOP ESTIGMA</span>
            </h1>

            <p className="text-lg md:text-xl text-stone-600 mb-10 leading-relaxed max-w-2xl mx-auto">
              Uma plataforma para dar voz a experiências de discriminação por peso e transformar essas vivências em aprendizado coletivo.
            </p>

            <div className="flex flex-col sm:flex-row items-center justify-center gap-4 mt-8">
              <button
                onClick={() => onNavigate('report')}
                className="w-full sm:w-auto flex items-center justify-center bg-rose-600 hover:bg-rose-700 text-white font-bold text-lg px-8 py-4 rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1"
              >
                <MessageSquare className="mr-3 h-6 w-6" />
                Relatar Experiência
              </button>

              <button
                onClick={() => onNavigate('feed')}
                className="w-full sm:w-auto flex items-center justify-center bg-white border-2 border-stone-200 hover:border-rose-300 text-stone-700 hover:text-rose-700 font-bold text-lg px-8 py-4 rounded-2xl shadow-sm hover:shadow-md transition-all transform hover:-translate-y-1"
              >
                <Search className="mr-3 h-6 w-6" />
                Ver Relatos
              </button>
            </div>
          </div>

          <div className="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto mt-20">
            <div className="bg-white border border-stone-100 rounded-2xl p-8 shadow-sm text-center">
              <div className="bg-stone-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <Shield className="h-8 w-8 text-stone-400" />
              </div>
              <h3 className="text-xl font-bold text-stone-800 mb-2">Garantia de Anonimato</h3>
              <p className="text-stone-500">Nenhum dado pessoal é coletado. O foco é na experiência e na melhoria dos ambientes.</p>
            </div>

            <div className="bg-white border border-stone-100 rounded-2xl p-8 shadow-sm text-center">
              <div className="bg-rose-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <Lightbulb className="h-8 w-8 text-rose-500" />
              </div>
              <h3 className="text-xl font-bold text-stone-800 mb-2">Foco na Solução</h3>
              <p className="text-stone-500">Os relatos ajudam a gerar conscientização e sugestões práticas para ambientes mais inclusivos.</p>
            </div>
          </div>
        </div>
      );
    }

    // =========================
    // FORMULÁRIO
    // =========================
    function ReportForm({ onSubmit, onNavigate }) {
      const [formData, setFormData] = useState({
        location: '',
        customLocation: '',
        description: '',
        feelings: '',
        suggestion: ''
      });
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isSuccess, setIsSuccess] = useState(false);
      const [errorMessage, setErrorMessage] = useState('');

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        setErrorMessage('');

        try {
          await onSubmit(formData);
          setIsSuccess(true);
          setTimeout(() => onNavigate('feed'), 1500);
        } catch (error) {
          setErrorMessage('Não foi possível enviar o relato. Confira a anon key do Supabase e as policies da tabela.');
        } finally {
          setIsSubmitting(false);
        }
      };

      if (isSuccess) {
        return (
          <div className="max-w-2xl mx-auto bg-white p-10 rounded-2xl shadow-sm border border-stone-200 text-center animate-fade-in">
            <div className="bg-green-100 p-4 rounded-full inline-block mb-6">
              <CheckCircle2 className="h-12 w-12 text-green-600" />
            </div>
            <h2 className="text-3xl font-bold text-stone-900 mb-4">Relato Publicado!</h2>
            <p className="text-lg text-stone-600 mb-6">
              Seu relato foi enviado com sucesso.
            </p>
            <p className="text-sm text-stone-400 animate-pulse">Redirecionando para o mural...</p>
          </div>
        );
      }

      return (
        <div className="max-w-3xl mx-auto animate-slide-up">
          <div className="mb-8">
            <h1 className="text-3xl font-bold text-stone-900 mb-3">Relatar Experiência</h1>
            <p className="text-stone-600">Este é o seu espaço seguro. Descreva o que aconteceu.</p>
          </div>

          <div className="bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden">
            <div className="bg-rose-50 border-b border-rose-100 px-8 py-4 flex items-center text-sm font-medium text-rose-800">
              <Shield className="h-5 w-5 text-rose-600 mr-2" />
              Modo Anônimo: Você está protegido.
            </div>

            <form onSubmit={handleSubmit} className="p-8 space-y-6">
              <div>
                <label className="block text-sm font-bold text-stone-800 mb-2">Onde isso aconteceu? *</label>
                <select
                  name="location"
                  required
                  value={formData.location}
                  onChange={handleChange}
                  className="w-full bg-stone-50 border border-stone-300 rounded-xl px-4 py-3 text-stone-700 focus:ring-2 focus:ring-rose-500 outline-none"
                >
                  <option value="" disabled>Selecione o local</option>
                  <option value="Restaurante">Restaurante / Bar</option>
                  <option value="Academia">Academia / Centro Esportivo</option>
                  <option value="Clínica/Hospital">Clínica / Hospital</option>
                  <option value="Loja">Loja de Roupas</option>
                  <option value="Transporte">Transporte Público / Avião</option>
                  <option value="Trabalho">Ambiente de Trabalho</option>
                  <option value="Outro">Outro</option>
                </select>
              </div>

              {formData.location === 'Outro' && (
                <div className="animate-fade-in">
                  <label className="block text-sm font-bold text-stone-800 mb-2">Qual foi o local? *</label>
                  <input
                    type="text"
                    name="customLocation"
                    required
                    value={formData.customLocation}
                    onChange={handleChange}
                    className="w-full bg-stone-50 border border-stone-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-rose-500"
                  />
                </div>
              )}

              <div>
                <label className="block text-sm font-bold text-stone-800 mb-2">Descreva o que aconteceu *</label>
                <textarea
                  name="description"
                  required
                  rows="4"
                  value={formData.description}
                  onChange={handleChange}
                  placeholder="Não inclua nomes reais de pessoas ou marcas..."
                  className="w-full bg-stone-50 border border-stone-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-rose-500 resize-none"
                ></textarea>
              </div>

              <div>
                <label className="block text-sm font-bold text-stone-800 mb-2">Como você se sentiu?</label>
                <textarea
                  name="feelings"
                  rows="2"
                  value={formData.feelings}
                  onChange={handleChange}
                  className="w-full bg-stone-50 border border-stone-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-rose-500 resize-none"
                ></textarea>
              </div>

              <div className="bg-rose-50/50 rounded-2xl p-6 border border-rose-200">
                <label className="block text-sm font-bold text-rose-900 mb-2 flex items-center">
                  <Lightbulb className="h-5 w-5 mr-2 text-rose-600" />
                  O que poderia ter sido feito melhor? *
                </label>
                <p className="text-xs text-stone-500 mb-3">Qual a sua sugestão para tornar esse ambiente mais inclusivo?</p>
                <textarea
                  name="suggestion"
                  required
                  rows="3"
                  value={formData.suggestion}
                  onChange={handleChange}
                  className="w-full bg-white border border-rose-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-rose-500 resize-none"
                ></textarea>
              </div>

              {errorMessage && (
                <div className="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                  {errorMessage}
                </div>
              )}

              <div className="pt-4 flex justify-end gap-4">
                <button
                  type="button"
                  onClick={() => onNavigate('home')}
                  className="px-6 py-3 font-medium text-stone-500 hover:text-stone-800"
                >
                  Cancelar
                </button>

                <button
                  type="submit"
                  disabled={isSubmitting}
                  className={`px-8 py-3 bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-xl shadow flex items-center ${isSubmitting ? 'opacity-70 cursor-not-allowed' : ''}`}
                >
                  {isSubmitting ? 'Enviando...' : 'Publicar Anonimamente'}
                  {!isSubmitting && <ArrowRight className="ml-2 h-5 w-5" />}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // =========================
    // FEED
    // =========================
    function FeedView({ reports, isLoading }) {
      const [filterLocation, setFilterLocation] = useState('Todos');
      const locations = ['Todos', 'Restaurante', 'Academia', 'Clínica/Hospital', 'Loja', 'Transporte', 'Trabalho', 'Outro'];

      const filteredReports = reports.filter((r) => {
        if (filterLocation === 'Todos') return true;
        if (filterLocation === 'Outro') {
          return !['Restaurante', 'Academia', 'Clínica/Hospital', 'Loja', 'Transporte', 'Trabalho'].includes(r.location);
        }
        return r.location === filterLocation;
      });

      return (
        <div className="animate-slide-up">
          <div className="mb-10 text-center">
            <h1 className="text-3xl font-bold text-stone-900 mb-3">Mural de Relatos</h1>
            <p className="text-stone-600">Experiências reais transformadas em aprendizado.</p>
          </div>

          <div className="flex flex-col md:flex-row gap-8">
            <div className="w-full md:w-64 flex-shrink-0">
              <div className="bg-white p-6 rounded-2xl border border-stone-200 sticky top-24">
                <h3 className="font-bold text-stone-900 mb-4 flex items-center">
                  <Filter className="h-5 w-5 mr-2 text-stone-500" />
                  Filtrar por Local
                </h3>
                <div className="space-y-3">
                  {locations.map((loc) => (
                    <button
                      key={loc}
                      onClick={() => setFilterLocation(loc)}
                      className={`block w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors ${filterLocation === loc ? 'bg-rose-100 text-rose-800' : 'text-stone-600 hover:bg-stone-50'}`}
                    >
                      {loc}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            <div className="flex-grow space-y-6">
              {isLoading ? (
                <div className="text-center py-12 text-stone-400">Carregando relatos do banco...</div>
              ) : filteredReports.length === 0 ? (
                <div className="bg-white p-12 text-center rounded-2xl border border-stone-200">
                  <Search className="h-10 w-10 text-stone-300 mx-auto mb-4" />
                  <h3 className="text-lg font-medium text-stone-900">Nenhum relato encontrado.</h3>
                </div>
              ) : (
                filteredReports.map((report) => (
                  <div key={report.id} className="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden hover:shadow-md transition-shadow">
                    <div className="p-6 md:p-8">
                      <span className="inline-block px-3 py-1 bg-stone-100 text-stone-700 text-xs font-bold rounded-full mb-4 uppercase tracking-wide">
                        {report.location}
                      </span>

                      <div className="mb-6">
                        <p className="text-stone-800 text-lg leading-relaxed">"{report.description}"</p>
                      </div>

                      {report.feelings && (
                        <div className="mb-6">
                          <h4 className="text-xs font-bold text-stone-400 uppercase tracking-wider mb-1">Impacto Gerado</h4>
                          <p className="text-stone-500 italic">{report.feelings}</p>
                        </div>
                      )}

                      <div className="bg-[#F0FDF4] border border-[#BBF7D0] rounded-xl p-5 mt-4">
                        <h4 className="text-sm font-bold text-green-800 uppercase tracking-wider mb-2 flex items-center">
                          <Lightbulb className="h-5 w-5 mr-2 text-green-600" />
                          Sugestão de Melhoria
                        </h4>
                        <p className="text-green-900 font-medium">{report.suggestion}</p>
                      </div>
                    </div>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    }

    // =========================
    // APRENDER
    // =========================
    function LearnView() {
      return (
        <div className="animate-slide-up max-w-4xl mx-auto">
          <div className="text-center mb-12">
            <h1 className="text-3xl font-bold text-stone-900 mb-4">Como Combater a Discriminação</h1>
            <p className="text-lg text-stone-600">Guia prático construído a partir das sugestões deixadas na plataforma.</p>
          </div>

          <div className="space-y-6">
            {learningData.map((section, idx) => (
              <div key={idx} className="bg-white rounded-2xl shadow-sm border border-stone-200 p-6">
                <h2 className="text-xl font-bold text-rose-700 mb-4">{section.category}</h2>
                <ul className="space-y-3">
                  {section.tips.map((tip, i) => (
                    <li key={i} className="flex items-start">
                      <CheckCircle2 className="h-6 w-6 text-green-500 mr-3 flex-shrink-0" />
                      <span className="text-stone-700">{tip}</span>
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
