<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STOP ESTIGMA DO PESO - Relatos Anônimos</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    .animate-slide-up { animation: slideUp 0.6s ease-out forwards; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
  </style>
</head>
<body class="bg-[#FDFBF7] font-sans text-stone-800 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    // =========================
    // CONFIGURAÇÃO SUPABASE (INTACTA)
    // =========================
    const supabaseUrl = 'https://mybchkuhrgwzlyusfccn.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15YmNoa3Vocmd3emx5dXNmY2NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODY3NjEsImV4cCI6MjA5MDY2Mjc2MX0.-sZQzrcD7fi2x84RqdBGsr6-b-hkMaamVsvOJBBam60';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const REPORTS_PAGE_SIZE = 15;

    // =========================
    // HOOKS AUXILIARES
    // =========================
    function useDebouncedValue(value, delay = 300) {
      const [debouncedValue, setDebouncedValue] = useState(value);

      useEffect(() => {
        const timeout = setTimeout(() => setDebouncedValue(value), delay);
        return () => clearTimeout(timeout);
      }, [value, delay]);

      return debouncedValue;
    }

    // =========================
    // ÍCONES
    // =========================
    const Icon = ({ path, className = "w-6 h-6", fill = "none" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {path}
      </svg>
    );

    const Hand = (p) => <Icon {...p} path={<><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 7.5V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M10 10.5V5a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M6 14v-1.5a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M18 11v4a6 6 0 0 1-6 6h-2.5a6 6 0 0 1-6-6v-1.5"/></>} />;
    const Shield = (p) => <Icon {...p} path={<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>} />;
    const SearchIcon = (p) => <Icon {...p} path={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>} />;
    const MessageSquare = (p) => <Icon {...p} path={<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>} />;
    const ArrowRight = (p) => <Icon {...p} path={<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>} />;
    const CheckCircle2 = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>} />;
    const Lightbulb = (p) => <Icon {...p} path={<><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>} />;
    const FilterIcon = (p) => <Icon {...p} path={<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>} />;
    const ThumbsUp = (p) => <Icon {...p} path={<path d="M7 10v12M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z"/>} />;
    const MenuIcon = (p) => <Icon {...p} path={<><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></>} />;
    const XIcon = (p) => <Icon {...p} path={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />;
    const MapPinIcon = (p) => <Icon {...p} path={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>} />;
    const BarChartIcon = (p) => <Icon {...p} path={<><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>} />;
    const ActivityIcon = (p) => <Icon {...p} path={<><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></>} />;
    const ChevronUp = (p) => <Icon {...p} path={<path d="m18 15-6-6-6 6"/>} />;
    const ChevronDown = (p) => <Icon {...p} path={<path d="m6 9 6 6 6-6"/>} />;
    const InfoIcon = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>} />;

    // =========================
    // LISTAS DE APOIO
    // =========================
    const ALL_LOCATIONS = [
      "Restaurante", "Academia", "Clínica/Hospital", "Consultório Médico",
      "Consultório Psicológico", "Nutricionista", "Clínicas Estéticas",
      "Loja", "Shopping", "Transporte Público", "Avião/Aeroporto",
      "Uber/Motorista", "Trabalho", "Entrevista de Emprego", "Escola/Faculdade",
      "Família", "Grupo de Amigos", "Festas/Eventos Sociais", "Relacionamentos/Encontros",
      "Redes Sociais", "Internet/Comentários Online", "Jogos Online",
      "Eventos/Auditórios/Igrejas", "Espaços Públicos (parques, praia)",
      "Aulas (yoga, dança, esportes)", "Delivery/Atendimento Online", "Outro"
    ].sort();

    const BRAZIL_STATES = [
      'AC', 'AL', 'AP', 'AM', 'BA', 'CE', 'DF', 'ES', 'GO', 'MA', 'MT', 'MS', 'MG',
      'PA', 'PB', 'PR', 'PE', 'PI', 'RJ', 'RN', 'RS', 'RO', 'RR', 'SC', 'SP', 'SE', 'TO'
    ];

    // =========================
    // DADOS DE APOIO
    // =========================
    const fallbackReports = [
      { id: 1, location: 'Clínica/Hospital', city: 'São Paulo - SP', description: 'Fui ao médico e senti que a minha queixa foi ignorada por causa do meu corpo.', feelings: 'Me senti humilhada e invalidada.', suggestion: 'Ouvir a queixa principal do paciente sem presumir tudo pelo peso.', likes: 0 },
      { id: 2, location: 'Academia', city: 'Rio de Janeiro - RJ', description: 'Ao entrar na academia, recebi comentários não solicitados sobre emagrecimento.', feelings: 'Fiquei desconfortável e deslocada.', suggestion: 'Treinar a equipe para acolher sem comentar o corpo dos alunos.', likes: 0 }
    ];

    const learningData = [
      { category: 'Ambientes de Saúde', tips: ['Adquira equipamentos adequados (macas, balanças, cadeiras) para todos os corpos.', 'Foque na queixa principal do paciente, não resuma o diagnóstico ao peso.', 'Treine a equipe para um acolhimento empático e sem julgamentos.'] },
      { category: 'Academias e Esportes', tips: ['Garanta infraestrutura acessível (catracas, aparelhos).', 'Evite presumir que o único objetivo do aluno é emagrecer.', 'Promova um ambiente focado em saúde e bem-estar, não apenas estética.'] },
      { category: 'Lojas e Comércio', tips: ['Ofereça uma grade de tamanhos realmente inclusiva.', 'Treine vendedores para não fazerem comentários sobre o corpo do cliente ou sugerirem dietas.'] }
    ];

    // =========================
    // APP PRINCIPAL
    // =========================
    function App() {
      const [currentView, setCurrentView] = useState('home');
      const [reports, setReports] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [isLoadingMore, setIsLoadingMore] = useState(false);
      const [hasMoreReports, setHasMoreReports] = useState(true);
      const [currentPage, setCurrentPage] = useState(0);
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [hasLoadedFeedOnce, setHasLoadedFeedOnce] = useState(false);
      const [hasLoadedDashboardOnce, setHasLoadedDashboardOnce] = useState(false);

      const reportsById = useMemo(() => {
        const index = new Map();
        reports.forEach(report => index.set(report.id, report));
        return index;
      }, [reports]);

      const fetchReportsPage = useCallback(async (page = 0, replace = false) => {
        const isFirstPage = page === 0;

        try {
          if (isFirstPage) {
            setIsLoading(true);
          } else {
            setIsLoadingMore(true);
          }

          const from = page * REPORTS_PAGE_SIZE;
          const to = from + REPORTS_PAGE_SIZE - 1;

          const { data, error } = await supabase
            .from('reports')
            .select('id, location, description, feelings, suggestion, likes, city')
            .order('id', { ascending: false })
            .range(from, to);

          if (error) throw error;

          const received = data || [];

          setReports(prev => {
            if (replace) return received;

            const merged = [...prev];
            const existingIds = new Set(prev.map(item => item.id));
            received.forEach(item => {
              if (!existingIds.has(item.id)) merged.push(item);
            });
            return merged;
          });

          setCurrentPage(page);
          setHasMoreReports(received.length === REPORTS_PAGE_SIZE);
        } catch (error) {
          console.error('Erro ao buscar relatos:', error);
          if (isFirstPage) {
            setReports(fallbackReports);
            setHasMoreReports(false);
          }
        } finally {
          setIsLoading(false);
          setIsLoadingMore(false);
        }
      }, []);

      const fetchAllReportsForDashboard = useCallback(async () => {
        try {
          setIsLoading(true);

          let allReports = [];
          let page = 0;
          let keepFetching = true;

          while (keepFetching) {
            const from = page * 1000;
            const to = from + 999;

            const { data, error } = await supabase
              .from('reports')
              .select('id, location, description, feelings, suggestion, likes, city')
              .order('id', { ascending: false })
              .range(from, to);

            if (error) throw error;

            const batch = data || [];
            allReports = allReports.concat(batch);

            if (batch.length < 1000) {
              keepFetching = false;
            } else {
              page += 1;
            }
          }

          setReports(allReports);
          setHasMoreReports(false);
        } catch (error) {
          console.error('Erro ao buscar dados completos para o dashboard:', error);
          if (reports.length === 0) setReports(fallbackReports);
        } finally {
          setIsLoading(false);
        }
      }, [reports.length]);

      useEffect(() => {
        if (currentView === 'feed' && !hasLoadedFeedOnce) {
          fetchReportsPage(0, true);
          setHasLoadedFeedOnce(true);
        }

        if (currentView === 'dashboard' && !hasLoadedDashboardOnce) {
          fetchAllReportsForDashboard();
          setHasLoadedDashboardOnce(true);
        }
      }, [currentView, hasLoadedFeedOnce, hasLoadedDashboardOnce, fetchReportsPage, fetchAllReportsForDashboard]);

      const loadMoreReports = useCallback(() => {
        if (!isLoadingMore && hasMoreReports) {
          fetchReportsPage(currentPage + 1, false);
        }
      }, [currentPage, fetchReportsPage, hasMoreReports, isLoadingMore]);

      const handleToggleLike = useCallback(async (reportId, isCurrentlyLikedLocally, currentLikes) => {
        const report = reportsById.get(reportId);
        if (!report) return;

        const newLikes = isCurrentlyLikedLocally ? Math.max(0, currentLikes - 1) : currentLikes + 1;

        setReports(prev => prev.map(r => r.id === reportId ? { ...r, likes: newLikes } : r));

        try {
          const { error } = await supabase
            .from('reports')
            .update({ likes: newLikes })
            .eq('id', reportId);

          if (error) throw error;
        } catch (err) {
          console.error('Erro ao atualizar likes:', err);
          setReports(prev => prev.map(r => r.id === reportId ? { ...r, likes: currentLikes } : r));
        }
      }, [reportsById]);

      const navigateTo = useCallback((view) => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setCurrentView(view);
        setIsMobileMenuOpen(false);
      }, []);

      const handleAddReport = useCallback(async (newReport) => {
        const basePayload = {
          location: newReport.location === 'Outro'
            ? (newReport.customLocation.trim() || 'Outro')
            : newReport.location,
          city: `${newReport.city.trim()} - ${newReport.state}`,
          description: newReport.description.trim(),
          feelings: newReport.feelings.trim(),
          suggestion: newReport.suggestion.trim()
        };

        const exactPlaceValue = newReport.exactPlaceName.trim();

        let insertResult = await supabase
          .from('reports')
          .insert([
            {
              ...basePayload,
              location_details: exactPlaceValue
            }
          ]);

        if (insertResult.error && /column/i.test(insertResult.error.message || '')) {
          insertResult = await supabase
            .from('reports')
            .insert([
              {
                ...basePayload,
                detalhes_localizacao: exactPlaceValue
              }
            ]);
        }

        if (insertResult.error && /column/i.test(insertResult.error.message || '')) {
          insertResult = await supabase
            .from('reports')
            .insert([basePayload]);
        }

        if (insertResult.error) {
          console.error('Erro ao salvar relato:', insertResult.error);
          throw insertResult.error;
        }

        if (hasLoadedFeedOnce) {
          await fetchReportsPage(0, true);
        }
      }, [fetchReportsPage, hasLoadedFeedOnce]);

      return (
        <div className="min-h-screen flex flex-col">
          <nav className="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-rose-100 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-20">
                <div className="flex items-center cursor-pointer group min-w-0 mr-4" onClick={() => navigateTo('home')}>
                  <div className="bg-rose-600 p-2.5 rounded-xl group-hover:bg-rose-700 transition-colors shadow-sm flex-shrink-0">
                    <Hand className="h-7 w-7 text-white" />
                  </div>
                  <div className="ml-2 md:ml-3 flex flex-col min-w-0">
                    <span className="font-black text-lg sm:text-xl md:text-2xl tracking-tighter text-stone-900 leading-tight truncate">
                      STOP <span className="text-rose-600">ESTIGMA DO PESO</span>
                    </span>
                    <span className="text-[10px] md:text-xs font-semibold text-stone-500 mt-0.5 truncate">Juntos contra o preconceito</span>
                  </div>
                </div>

                <div className="hidden md:flex space-x-6 items-center">
                  <button onClick={() => navigateTo('home')} className={`font-semibold transition-colors ${currentView === 'home' ? 'text-rose-600' : 'text-stone-500 hover:text-rose-600'}`}>Início</button>
                  <button onClick={() => navigateTo('feed')} className={`font-semibold transition-colors ${currentView === 'feed' ? 'text-rose-600' : 'text-stone-500 hover:text-rose-600'}`}>Ver Relatos</button>
                  <button onClick={() => navigateTo('learn')} className={`font-semibold transition-colors ${currentView === 'learn' ? 'text-rose-600' : 'text-stone-500 hover:text-rose-600'}`}>Como agir</button>
                  <button onClick={() => navigateTo('dashboard')} className={`font-semibold transition-colors ${currentView === 'dashboard' ? 'text-rose-600' : 'text-stone-500 hover:text-rose-600'}`}>Relatório</button>
                  <a href="https://docs.google.com/forms/d/e/1FAIpQLSd2OLg3vHN5jI7-2uKYUf2Zq9bsPZi19xD7cVJl8eaYPWUPCA/viewform?usp=dialog" target="_blank" rel="noopener noreferrer" className="font-semibold transition-colors text-stone-500 hover:text-rose-600">Avaliar a plataforma</a>
                  <button onClick={() => navigateTo('report')} className="bg-rose-600 text-white font-bold px-6 py-2.5 rounded-full hover:bg-rose-700 transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5 ml-2">
                    Relatar Experiência
                  </button>
                </div>

                <div className="md:hidden flex items-center gap-2">
                  <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-stone-600 p-2 focus:outline-none">
                    {isMobileMenuOpen ? <XIcon className="w-8 h-8" /> : <MenuIcon className="w-8 h-8" />}
                  </button>
                </div>
              </div>
            </div>

            {isMobileMenuOpen && (
              <div className="md:hidden absolute top-20 left-0 w-full bg-white border-b border-rose-100 shadow-lg py-4 px-6 flex flex-col space-y-4 animate-slide-up z-40">
                <button onClick={() => navigateTo('home')} className={`text-left text-lg font-bold py-3 border-b border-stone-100 ${currentView === 'home' ? 'text-rose-600' : 'text-stone-700'}`}>Início</button>
                <button onClick={() => navigateTo('feed')} className={`text-left text-lg font-bold py-3 border-b border-stone-100 ${currentView === 'feed' ? 'text-rose-600' : 'text-stone-700'}`}>Ver Relatos</button>
                <button onClick={() => navigateTo('learn')} className={`text-left text-lg font-bold py-3 border-b border-stone-100 ${currentView === 'learn' ? 'text-rose-600' : 'text-stone-700'}`}>Como agir</button>
                <button onClick={() => navigateTo('dashboard')} className={`text-left text-lg font-bold py-3 border-b border-stone-100 ${currentView === 'dashboard' ? 'text-rose-600' : 'text-stone-700'}`}>Relatório</button>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSd2OLg3vHN5jI7-2uKYUf2Zq9bsPZi19xD7cVJl8eaYPWUPCA/viewform?usp=dialog" target="_blank" rel="noopener noreferrer" className="text-left text-lg font-bold py-3 border-b border-stone-100 text-stone-700 block">Avaliar a plataforma</a>
                <button onClick={() => navigateTo('report')} className="bg-rose-600 text-white font-bold px-6 py-4 rounded-xl text-center mt-4 shadow-md">
                  Relatar Experiência
                </button>
              </div>
            )}
          </nav>

          <main className="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-4 md:py-6">
            {currentView === 'home' && <HomeView onNavigate={navigateTo} />}
            {currentView === 'report' && <ReportForm onSubmit={handleAddReport} onNavigate={navigateTo} />}
            {currentView === 'feed' && (
              <FeedView
                reports={reports}
                isLoading={isLoading}
                isLoadingMore={isLoadingMore}
                hasMoreReports={hasMoreReports}
                onLoadMore={loadMoreReports}
                onToggleLike={handleToggleLike}
                onNavigate={navigateTo}
              />
            )}
            {currentView === 'learn' && <LearnView onNavigate={navigateTo} />}
            {currentView === 'dashboard' && <DashboardView reports={reports} isLoading={isLoading} />}
          </main>

          <footer className="bg-stone-900 text-white py-12 mt-auto">
            <div className="max-w-6xl mx-auto px-4 text-center">
              <div className="flex justify-center items-center mb-6">
                <Hand className="h-8 w-8 text-rose-500 mr-3" />
                <span className="font-black text-2xl tracking-tighter">STOP ESTIGMA DO PESO</span>
              </div>
              <p className="text-stone-400 text-base max-w-2xl mx-auto mb-6">
                Um espaço seguro e anônimo para dar voz às experiências de discriminação e educar a sociedade para ambientes mais inclusivos.
              </p>
              <div className="pt-6 border-t border-stone-800 text-stone-500 text-sm font-medium">
                Criado por pesquisadores que entendem essa dor e buscam transformação real.
              </div>
            </div>
          </footer>
        </div>
      );
    }

    // =========================
    // HOME VIEW
    // =========================
    function HomeView({ onNavigate }) {
      const [isInfoOpen, setIsInfoOpen] = useState(false);

      return (
        <div className="animate-slide-up">
          <div className="text-center max-w-5xl mx-auto mb-16 pt-6 md:pt-2">
            <div className="inline-flex items-center space-x-2 bg-green-100 text-green-800 px-4 py-1.5 md:px-5 md:py-2 rounded-full text-xs md:text-sm font-bold mb-6 md:mb-8 shadow-sm">
              <Shield className="h-4 w-4 md:h-5 md:w-5" />
              <span>Ambiente 100% Anônimo, Seguro e Sem Julgamentos</span>
            </div>

            <h1 className="text-4xl sm:text-5xl md:text-7xl font-black leading-tight mb-6 md:mb-8 tracking-tight text-center">
              <span className="block text-stone-900">Sua voz importa.</span>
              <span className="block text-rose-600">E sua atitude também.</span>
            </h1>

            <p className="text-lg md:text-2xl text-stone-600 mb-8 md:mb-12 leading-relaxed max-w-3xl mx-auto text-center px-2">
              Você pode ajudar a combater o preconceito e a discriminação relacionados ao peso de duas formas:
            </p>

            <div className="flex justify-center mb-8">
              <button
                onClick={() => setIsInfoOpen(true)}
                className="inline-flex items-center gap-2 bg-white border-2 border-stone-200 text-stone-800 font-bold px-6 py-3 rounded-full hover:border-rose-300 hover:text-rose-600 transition-all shadow-sm"
              >
                <InfoIcon className="w-5 h-5" />
                O que é estigma do peso?
              </button>
            </div>

            <div className="grid grid-cols-2 gap-3 md:gap-6 max-w-5xl mx-auto">
              <button
                onClick={() => onNavigate('report')}
                className="group relative bg-rose-600 text-left p-4 sm:p-5 md:p-10 rounded-2xl md:rounded-3xl shadow-xl hover:shadow-2xl hover:bg-rose-700 transition-all transform hover:-translate-y-2 overflow-hidden flex flex-col justify-start"
              >
                <div className="absolute top-0 right-0 -mt-4 -mr-4 bg-white/10 w-32 h-32 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-700"></div>
                <h2 className="text-base sm:text-xl md:text-3xl font-black text-white mb-2 md:mb-4 flex items-center leading-tight">
                  1️⃣ Relatar sua experiência
                </h2>
                <p className="text-rose-100 text-xs sm:text-sm md:text-lg font-medium leading-snug">
                  Compartilhe sua experiência de preconceito ou discriminação por conta do peso e diga como as pessoas poderiam agir com mais respeito.
                </p>
              </button>

              <button
                onClick={() => onNavigate('feed')}
                className="group bg-white border-2 border-stone-200 text-left p-4 sm:p-5 md:p-10 rounded-2xl md:rounded-3xl shadow-md hover:shadow-xl hover:border-rose-300 transition-all transform hover:-translate-y-2 flex flex-col justify-start"
              >
                <h2 className="text-base sm:text-xl md:text-3xl font-black text-stone-900 mb-2 md:mb-4 flex items-center leading-tight">
                  2️⃣ Identificar e Combater
                </h2>
                <p className="text-stone-600 text-xs sm:text-sm md:text-lg font-medium leading-snug">
                  Leia relatos reais de pessoas que viveram preconceito e discriminação só por conta do seu peso e saiba como agir com respeito em diferentes situações.
                </p>
              </button>
            </div>
          </div>

          {isInfoOpen && (
            <div className="fixed inset-0 z-[100] bg-black/40 flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-white max-w-xl w-full rounded-3xl shadow-2xl border border-stone-100 p-8 relative animate-slide-up">
                <button
                  onClick={() => setIsInfoOpen(false)}
                  className="absolute top-4 right-4 text-stone-400 hover:text-stone-700 p-2"
                  aria-label="Fechar"
                >
                  <XIcon className="w-6 h-6" />
                </button>

                <div className="flex items-center mb-4">
                  <div className="bg-rose-100 p-3 rounded-2xl mr-4">
                    <InfoIcon className="w-7 h-7 text-rose-600" />
                  </div>
                  <h2 className="text-2xl md:text-3xl font-black text-stone-900">O que é estigma do peso?</h2>
                </div>

                <p className="text-lg text-stone-700 leading-relaxed">
                  É o preconceito ou a discriminação contra uma pessoa por causa do seu peso corporal, especialmente quando ela está acima do peso. Isso também é conhecido como gordofobia.
                </p>
                <p className="text-lg text-stone-700 leading-relaxed mt-4">
                  Esse estigma pode aparecer em comentários, humilhações, exclusões, atendimentos desrespeitosos ou julgamentos em lugares como lojas, academias, hospitais, trabalho e outros ambientes do dia a dia.
                </p>

                <button
                  onClick={() => setIsInfoOpen(false)}
                  className="mt-8 bg-rose-600 text-white font-bold px-6 py-3 rounded-full hover:bg-rose-700 transition-all"
                >
                  Fechar
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // =========================
    // FORMULÁRIO DE RELATO (ATUALIZADO)
    // =========================
    function ReportForm({ onSubmit, onNavigate }) {
      const [formData, setFormData] = useState({
        state: '',
        city: '',
        location: '',
        customLocation: '',
        exactPlaceName: '',
        description: '',
        feelings: '',
        suggestion: ''
      });
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isSuccess, setIsSuccess] = useState(false);
      const [errorMessage, setErrorMessage] = useState('');

      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

      useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const handleChange = useCallback((e) => {
        setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
      }, []);

      const handleTextChange = useCallback((e) => {
        handleChange(e);
        e.target.style.height = 'auto';
        e.target.style.height = `${e.target.scrollHeight}px`;
      }, [handleChange]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        setErrorMessage('');
        try {
          await onSubmit(formData);
          setIsSuccess(true);
        } catch (error) {
          setErrorMessage('Não foi possível enviar. Verifique sua conexão e tente novamente.');
        } finally {
          setIsSubmitting(false);
        }
      };

      if (isSuccess) {
        return (
          <div className="max-w-2xl mx-auto bg-white p-12 rounded-3xl shadow-lg border border-stone-100 text-center animate-fade-in mt-10">
            <div className="bg-green-100 p-5 rounded-full inline-block mb-6"><CheckCircle2 className="h-16 w-16 text-green-600" /></div>
            <h2 className="text-4xl font-black text-stone-900 mb-4">Relato Publicado!</h2>
            <p className="text-xl text-stone-600 mb-8">Obrigado por compartilhar. Sua voz importa muito.</p>

            <button
              onClick={() => onNavigate('feed')}
              className="w-full mt-4 bg-rose-600 text-white font-bold px-8 py-4 rounded-2xl hover:bg-rose-700 transition-all shadow-md transform hover:-translate-y-1 flex items-center justify-center text-lg"
            >
              Você pode ver relatos de pessoas que também sofreram preconceito por conta do peso. <ArrowRight className="ml-2 w-5 h-5 flex-shrink-0 hidden md:block" />
            </button>
          </div>
        );
      }

      return (
        <div className="max-w-4xl mx-auto animate-slide-up">
          <div className="mb-10">
            <h1 className="text-4xl font-black text-stone-900 mb-4">Relatar Experiência</h1>
            <p className="text-base md:text-lg text-stone-600">Compartilhe seu relato com detalhes para ampliar a compreensão e a conscientização. Não inclua nomes ou informações que possam identificar alguém.</p>
          </div>

          <div className="bg-white rounded-[2rem] shadow-xl border border-stone-100 overflow-hidden">
            <div className="bg-rose-50 px-8 py-5 flex items-center text-rose-800 border-b border-rose-100">
              <Shield className="h-6 w-6 text-rose-600 mr-3" />
              <span className="font-bold text-lg">Modo de Segurança Ativo: Nenhuma informação pessoal sua será salva ou exibida.</span>
            </div>

            <form onSubmit={handleSubmit} className="p-8 md:p-12 space-y-8">
              <div className="grid grid-cols-2 gap-3 md:gap-6">
                <div>
                  <label className="block text-base md:text-lg font-bold text-stone-900 mb-2">Estado *</label>
                  <select
                    name="state"
                    required
                    value={formData.state}
                    onChange={handleChange}
                    className="w-full bg-stone-50 border-2 border-stone-200 rounded-2xl px-3 py-3 md:px-5 md:py-4 text-base md:text-lg text-stone-800 focus:ring-4 focus:ring-rose-100 focus:border-rose-500 outline-none transition-all cursor-pointer appearance-none"
                  >
                    <option value="" disabled>Selecione seu Estado</option>
                    {BRAZIL_STATES.map(uf => <option key={uf} value={uf}>{uf}</option>)}
                  </select>
                </div>

                <div>
                  <label className="block text-base md:text-lg font-bold text-stone-900 mb-2">Cidade *</label>
                  <input
                    type="text"
                    name="city"
                    required
                    value={formData.city}
                    onChange={handleChange}
                    placeholder="Sua cidade"
                    className="w-full bg-stone-50 border-2 border-stone-200 rounded-2xl px-3 py-3 md:px-5 md:py-4 text-base md:text-lg text-stone-800 focus:ring-4 focus:ring-rose-100 focus:border-rose-500 outline-none transition-all"
                  />
                </div>
              </div>

              <div>
                <label className="block text-lg font-bold text-stone-900 mb-1">Onde isso aconteceu? *</label>
                <p className="text-sm text-stone-600 mb-3 font-medium">Clique abaixo e escolha uma opção.</p>

                {isMobile ? (
                  <div className="space-y-3">
                    <select
                      name="location"
                      required
                      value={formData.location}
                      onChange={handleChange}
                      className="w-full bg-stone-50 border-2 border-stone-200 rounded-2xl px-5 py-4 text-lg text-stone-800 focus:ring-4 focus:ring-rose-100 focus:border-rose-500 outline-none transition-all cursor-pointer appearance-none"
                    >
                      <option value="" disabled>Selecione na lista...</option>
                      {ALL_LOCATIONS.map(loc => <option key={loc} value={loc}>{loc}</option>)}
                    </select>

                    {formData.location === 'Outro' && (
                      <input
                        type="text"
                        name="customLocation"
                        required
                        value={formData.customLocation}
                        onChange={handleChange}
                        placeholder="Digite o local onde aconteceu..."
                        className="w-full bg-stone-50 border-2 border-stone-200 rounded-2xl px-5 py-4 text-lg text-stone-800 focus:ring-4 focus:ring-rose-100 focus:border-rose-500 outline-none transition-all animate-fade-in"
                      />
                    )}
                  </div>
                ) : (
                  <div className="relative">
                    <input
                      list="locations-list"
                      name="location"
                      required
                      value={formData.location}
                      onChange={handleChange}
                      placeholder="Clique aqui para ver a lista ou digite o local..."
                      className="w-full bg-stone-50 border-2 border-stone-200 rounded-2xl px-5 py-4 text-lg text-stone-800 focus:ring-4 focus:ring-rose-100 focus:border-rose-500 outline-none transition-all cursor-pointer"
                    />
                    <datalist id="locations-list">
                      {ALL_LOCATIONS.map(loc => <option key={loc} value={loc} />)}
                    </datalist>
                  </div>
                )}
                <p className="text-sm text-stone-500 mt-2 font-medium">Se não encontrar na lista, basta {isMobile ? 'selecionar "Outro" e ' : ''}digitar o nome do local.</p>
              </div>

              <div>
                <label className="block text-lg font-bold text-stone-900 mb-2">Nome exato do local</label>
                <p className="text-sm text-stone-600 mb-3 font-medium">Ex: Loja X, Restaurante Y, Clínica Z. Essa informação será salva apenas no banco de dados e não aparecerá no site.</p>
                <input
                  type="text"
                  name="exactPlaceName"
                  value={formData.exactPlaceName}
                  onChange={handleChange}
                  placeholder="Digite o nome exato do local"
                  className="w-full bg-stone-50 border-2 border-stone-200 rounded-2xl px-5 py-4 text-lg text-stone-800 focus:ring-4 focus:ring-rose-100 focus:border-rose-500 outline-none transition-all"
                />
              </div>

              <div>
                <label className="block text-lg font-bold text-stone-900 mb-3">Descreva o que aconteceu *</label>
                <textarea
                  name="description"
                  required
                  rows="5"
                  value={formData.description}
                  onChange={handleTextChange}
                  placeholder="Ex: Fui a uma loja e a vendedora disse logo na entrada que 'não tinha nada para o meu tamanho' antes mesmo de eu perguntar..."
                  className="w-full bg-stone-50 border-2 border-stone-200 rounded-2xl px-5 py-4 text-lg outline-none focus:ring-4 focus:ring-rose-100 focus:border-rose-500 overflow-hidden resize-none transition-all"
                ></textarea>
              </div>

              <div>
                <label className="block text-lg font-bold text-stone-900 mb-3">Como você se sentiu?</label>
                <textarea
                  name="feelings"
                  rows="3"
                  value={formData.feelings}
                  onChange={handleTextChange}
                  placeholder="Ex: Me senti invisível, humilhada(o), com vontade de chorar, com raiva, desconfortável..."
                  className="w-full min-h-[140px] md:min-h-0 bg-stone-50 border-2 border-stone-200 rounded-2xl px-5 py-4 text-lg outline-none focus:ring-4 focus:ring-rose-100 focus:border-rose-500 overflow-hidden resize-none transition-all"
                ></textarea>
              </div>

              <div className="bg-rose-50/50 rounded-2xl p-5 md:p-8 border-2 border-rose-100">
                <label className="block text-lg font-bold text-rose-900 mb-2 flex items-center">
                  <Lightbulb className="h-6 w-6 mr-2 text-rose-600" />
                  O que poderia ter sido feito melhor? *
                </label>
                <p className="text-stone-600 mb-4 font-medium">Na sua visão, o que esse ambiente ou essas pessoas deveriam mudar para serem inclusivos?</p>
                <textarea
                  name="suggestion"
                  required
                  rows="3"
                  value={formData.suggestion}
                  onChange={handleTextChange}
                  placeholder="Ex: A loja deveria ter uma grade de numeração maior e treinar os funcionários para atenderem todos os clientes com o mesmo respeito..."
                  className="w-full min-h-[160px] md:min-h-0 bg-white border-2 border-rose-200 rounded-2xl px-5 py-4 text-lg outline-none focus:ring-4 focus:ring-rose-100 focus:border-rose-400 overflow-hidden resize-none transition-all"
                ></textarea>
              </div>

              {errorMessage && (
                <div className="rounded-2xl border-2 border-red-200 bg-red-50 px-5 py-4 text-red-700 font-bold">
                  {errorMessage}
                </div>
              )}

              <div className="pt-6 flex flex-col-reverse sm:flex-row justify-end gap-4 border-t border-stone-100">
                <button type="button" onClick={() => onNavigate('home')} className="px-8 py-4 font-bold text-stone-500 hover:bg-stone-100 rounded-2xl transition-colors">
                  Cancelar
                </button>
                <button type="submit" disabled={isSubmitting} className={`px-10 py-4 bg-rose-600 hover:bg-rose-700 text-white text-lg font-black rounded-2xl shadow-lg hover:shadow-xl transition-all flex items-center justify-center ${isSubmitting ? 'opacity-70 cursor-wait' : 'transform hover:-translate-y-1'}`}>
                  {isSubmitting ? 'Publicando de forma anônima...' : 'Publicar Meu Relato'}
                  {!isSubmitting && <ArrowRight className="ml-2 h-6 w-6" />}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // =========================
    // COMPONENTE: REPORT CARD
    // =========================
    const ReportCard = React.memo(function ReportCard({ report, likedLocally, onToggleLike, onNavigate, index }) {
      const [isExpanded, setIsExpanded] = useState(true);
      const [showFullText, setShowFullText] = useState(false);

      const bgClass = index % 2 === 0 ? 'bg-white' : 'bg-stone-50';

      const words = useMemo(() => report.description ? report.description.split(/\s+/) : [], [report.description]);
      const isLongText = words.length > 20;
      const displayText = useMemo(() => {
        return (isLongText && !showFullText)
          ? words.slice(0, 20).join(' ') + '...'
          : report.description;
      }, [isLongText, showFullText, words, report.description]);

      const handleExpandToggle = useCallback(() => {
        setIsExpanded(prev => !prev);
      }, []);

      const handleShowFullText = useCallback((e) => {
        e.stopPropagation();
        setShowFullText(prev => !prev);
      }, []);

      const handleLike = useCallback((e) => {
        e.stopPropagation();
        onToggleLike(report.id, report.likes);
      }, [onToggleLike, report.id, report.likes]);

      const handleNavigateReport = useCallback((e) => {
        e.stopPropagation();
        onNavigate('report');
      }, [onNavigate]);

      return (
        <div className={`${bgClass} rounded-3xl shadow-sm border border-stone-200 overflow-hidden hover:shadow-lg transition-shadow relative`}>
          <div
            onClick={handleExpandToggle}
            className="p-6 md:p-8 flex justify-between items-start cursor-pointer hover:opacity-80 transition-opacity"
            title={isExpanded ? "Clique para minimizar" : "Clique para expandir"}
          >
            <
